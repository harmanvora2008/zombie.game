<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DEADZONE</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  #hud {
    display: flex;
    gap: 40px;
    margin-bottom: 12px;
    color: #ff3333;
    font-size: 14px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  #hud span { color: #fff; }
  canvas {
    border: 2px solid #ff3333;
    box-shadow: 0 0 30px rgba(255,50,50,0.3);
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(0,0,0,0.85);
    color: #ff3333;
    font-family: 'Courier New', monospace;
    text-align: center;
  }
  #overlay h1 {
    font-size: 52px;
    letter-spacing: 10px;
    margin-bottom: 10px;
    text-shadow: 0 0 20px #ff3333;
  }
  #overlay p {
    color: #aaa;
    font-size: 13px;
    letter-spacing: 2px;
    margin: 6px 0;
  }
  #overlay .start-btn {
    margin-top: 30px;
    padding: 12px 40px;
    background: transparent;
    border: 2px solid #ff3333;
    color: #ff3333;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    letter-spacing: 4px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  #overlay .start-btn:hover { background: #ff3333; color: #000; }
  #controls {
    margin-top: 16px;
    color: #444;
    font-size: 11px;
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<div id="hud">
  LEVEL: <span id="lvl">1</span>
  &nbsp;&nbsp;HEALTH: <span id="hp">❤❤❤</span>
  &nbsp;&nbsp;KILLS: <span id="kills">0</span>
  &nbsp;&nbsp;AMMO: <span id="ammo">20/20</span>
</div>
<canvas id="c" width="700" height="500"></canvas>
<div id="controls">↑↓ MOVE &nbsp;|&nbsp; ←→ ROTATE &nbsp;|&nbsp; SPACE SHOOT</div>

<div id="overlay">
  <h1>DEADZONE</h1>
  <p>REACH THE EXIT — DON'T GET EATEN</p>
  <p style="color:#555;font-size:11px;margin-top:8px;">↑↓ MOVE &nbsp;|&nbsp; ←→ ROTATE &nbsp;|&nbsp; SPACE SHOOT</p>
  <button class="start-btn" onclick="startGame()">START</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const TILE = 40;

// FOV / alert constants
const Z_FOV    = Math.PI * 0.6;  // ~108° cone
const Z_RANGE  = 200;
const ALERT_SPEED = 1.8;         // bar fill per frame when spotted
const ALERT_DECAY = 1.0;         // bar drain per frame when not spotted

// Ammo constants
const MAX_AMMO      = 20;
const RELOAD_FRAMES = 150;       // ~2.5 s at 60 fps

let cam = { x: 0, y: 0 };
let worldW = 0, worldH = 0;

let state = 'menu';
let player, zombies, bullets, level, kills, gameOver, won;
let currentWalls, currentExit;
let keys = {};

// Maps: 24 cols × 16 rows  →  960 × 640 world  (canvas 700 × 500, so scrolls ~260 H, ~140 V)
const levels = [
  {
    map: [
      "########################",
      "#......................#",
      "#......................#",
      "#...##.....##..........#",
      "#...##.....##..........#",
      "#......................#",
      "#.........##...........#",
      "#.........##...........#",
      "#......................#",
      "#..............##......#",
      "#..............##......#",
      "#......................#",
      "#......................#",
      "#......................#",
      "#......................E",
      "########################",
    ],
    zombieCount: 4,
    playerStart: { x: 60, y: 60 }
  },
  {
    map: [
      "########################",
      "#......................#",
      "#.####.....##..........#",
      "#.#........##..........#",
      "#.####.................#",
      "#......................#",
      "#......................#",
      "#....####....####......#",
      "#....#..........#......#",
      "#....####....####......#",
      "#......................#",
      "#......................#",
      "#......##......##......#",
      "#......##......##......#",
      "#......................E",
      "########################",
    ],
    zombieCount: 8,
    playerStart: { x: 60, y: 60 }
  },
  {
    map: [
      "########################",
      "#......................#",
      "#.####.####.####.......#",
      "#.#....#....#..........#",
      "#.####.####.####.......#",
      "#......................#",
      "#....####.####.####....#",
      "#....#....#....#.......#",
      "#....####.####.####....#",
      "#......................#",
      "#.####.####.####.......#",
      "#.#....#....#..........#",
      "#.####.####.####.......#",
      "#......................#",
      "#......................E",
      "########################",
    ],
    zombieCount: 14,
    playerStart: { x: 60, y: 60 }
  }
];

// ── Map parsing ──────────────────────────────────────────────────────────────

function parseMap(lvlData) {
  const walls = [];
  const exit  = { x: 0, y: 0 };
  const rows  = lvlData.map;
  let maxCols = 0;
  for (let r = 0; r < rows.length; r++) {
    maxCols = Math.max(maxCols, rows[r].length);
    for (let c = 0; c < rows[r].length; c++) {
      const ch = rows[r][c];
      if (ch === '#') walls.push({ x: c * TILE, y: r * TILE, w: TILE, h: TILE });
      if (ch === 'E') { exit.x = c * TILE; exit.y = r * TILE; }
    }
  }
  worldW = maxCols * TILE;
  worldH = rows.length * TILE;
  return { walls, exit };
}

// ── Collision ────────────────────────────────────────────────────────────────

function collidesWalls(circle, walls) {
  for (const w of walls) {
    const cx = Math.max(w.x, Math.min(circle.x, w.x + w.w));
    const cy = Math.max(w.y, Math.min(circle.y, w.y + w.h));
    if (Math.hypot(circle.x - cx, circle.y - cy) < circle.r) return true;
  }
  return false;
}

// ── Line-of-sight ────────────────────────────────────────────────────────────

function hasLOS(fx, fy, tx, ty) {
  const dx = tx - fx, dy = ty - fy;
  const steps = Math.ceil(Math.hypot(dx, dy) / 8);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const px = fx + dx * t, py = fy + dy * t;
    for (const w of currentWalls) {
      if (px > w.x && px < w.x + w.w && py > w.y && py < w.y + w.h) return false;
    }
  }
  return true;
}

function canSeePlayer(z) {
  const dist = Math.hypot(player.x - z.x, player.y - z.y);
  if (dist > Z_RANGE) return false;
  let diff = Math.atan2(player.y - z.y, player.x - z.x) - z.angle;
  while (diff >  Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  if (Math.abs(diff) > Z_FOV / 2) return false;
  return hasLOS(z.x, z.y, player.x, player.y);
}

// ── Zombie spawning ──────────────────────────────────────────────────────────

function spawnZombies(count, walls, ps) {
  const zs = [];
  let attempts = 0;
  while (zs.length < count && attempts < 2000) {
    attempts++;
    const x = TILE * 2 + Math.random() * (worldW - 4 * TILE);
    const y = TILE * 2 + Math.random() * (worldH - 4 * TILE);
    if (Math.hypot(x - ps.x, y - ps.y) < 180) continue;
    if (collidesWalls({ x, y, r: 14 }, walls)) continue;
    zs.push({
      x, y,
      angle: Math.random() * Math.PI * 2,
      hp: 2, speed: 0.5 + Math.random() * 0.3,
      dead: false, flashTimer: 0,
      state: 'idle',   // 'idle' | 'alert' | 'chasing'
      alertLevel: 0,
      wanderAngle: Math.random() * Math.PI * 2,
      wanderTimer: Math.floor(Math.random() * 120) + 30
    });
  }
  return zs;
}

// ── Game lifecycle ───────────────────────────────────────────────────────────

function startGame() {
  document.getElementById('overlay').style.display = 'none';
  level = 0; kills = 0;
  loadLevel(0, true);
  state = 'playing';
  requestAnimationFrame(loop);
}

function loadLevel(idx, resetHp) {
  const lvlData = levels[idx];
  const parsed  = parseMap(lvlData);
  const hp      = (resetHp || !player) ? 3 : player.hp;
  player = {
    x: lvlData.playerStart.x,
    y: lvlData.playerStart.y,
    angle: 0, speed: 2.5, r: 12,
    hp,
    invTimer: 0,
    shootCooldown: 0,
    ammo: MAX_AMMO,
    reloading: false,
    reloadTimer: 0
  };
  zombies      = spawnZombies(lvlData.zombieCount, parsed.walls, lvlData.playerStart);
  bullets      = [];
  currentWalls = parsed.walls;
  currentExit  = parsed.exit;
  gameOver = false;
  won      = false;
  updateCamera();
}

function restartGame() {
  document.getElementById('overlay').style.display = 'none';
  level = 0; kills = 0;
  loadLevel(0, true);
  gameOver = false;
  won      = false;
  // loop is still spinning — no new rAF needed
}

function showOverlay(title, sub, btn) {
  const o = document.getElementById('overlay');
  o.style.display = 'flex';
  o.innerHTML = `
    <h1>${title}</h1>
    <p>${sub}</p>
    <button class="start-btn" onclick="restartGame()">${btn}</button>
  `;
}

// ── Camera ───────────────────────────────────────────────────────────────────

function updateCamera() {
  cam.x = Math.max(0, Math.min(player.x - W / 2, worldW - W));
  cam.y = Math.max(0, Math.min(player.y - H / 2, worldH - H));
}

// ── HUD ──────────────────────────────────────────────────────────────────────

function updateHUD() {
  document.getElementById('lvl').textContent   = level + 1;
  document.getElementById('hp').textContent    = '❤'.repeat(Math.max(0, player.hp)) || '☠';
  document.getElementById('kills').textContent = kills;
  if (player.reloading) {
    const pct = Math.floor((1 - player.reloadTimer / RELOAD_FRAMES) * 100);
    document.getElementById('ammo').textContent = `RELOAD ${pct}%`;
  } else {
    document.getElementById('ammo').textContent = `${player.ammo}/${MAX_AMMO}`;
  }
}

// ── Main loop ────────────────────────────────────────────────────────────────

let lastTime = 0;
function loop(ts = 0) {
  const dt = Math.min(ts - lastTime, 50);
  lastTime = ts;
  if (state === 'playing') {
    update(dt);
    draw();
    updateHUD();
    requestAnimationFrame(loop);
  }
}

// ── Update ───────────────────────────────────────────────────────────────────

function update() {
  if (gameOver || won) return;

  // Player rotation
  if (keys['ArrowLeft'])  player.angle -= 0.05;
  if (keys['ArrowRight']) player.angle += 0.05;

  // Player movement
  let dx = 0, dy = 0;
  if (keys['ArrowUp'])   { dx =  Math.cos(player.angle) * player.speed;       dy =  Math.sin(player.angle) * player.speed; }
  if (keys['ArrowDown']) { dx = -Math.cos(player.angle) * player.speed * 0.6; dy = -Math.sin(player.angle) * player.speed * 0.6; }
  const nx = player.x + dx, ny = player.y + dy;
  if (!collidesWalls({ x: nx, y: player.y, r: player.r }, currentWalls)) player.x = nx;
  if (!collidesWalls({ x: player.x, y: ny, r: player.r }, currentWalls)) player.y = ny;
  player.x = Math.max(player.r, Math.min(worldW - player.r, player.x));
  player.y = Math.max(player.r, Math.min(worldH - player.r, player.y));

  // Reload tick
  if (player.reloading) {
    player.reloadTimer--;
    if (player.reloadTimer <= 0) { player.ammo = MAX_AMMO; player.reloading = false; }
  }

  // Shoot
  if (keys[' '] && player.shootCooldown <= 0 && !player.reloading && player.ammo > 0) {
    bullets.push({
      x: player.x + Math.cos(player.angle) * 20,
      y: player.y + Math.sin(player.angle) * 20,
      vx: Math.cos(player.angle) * 8,
      vy: Math.sin(player.angle) * 8,
      life: 90
    });
    player.ammo--;
    player.shootCooldown = 14;
    if (player.ammo === 0) { player.reloading = true; player.reloadTimer = RELOAD_FRAMES; }
  }
  if (player.shootCooldown > 0) player.shootCooldown--;
  if (player.invTimer     > 0) player.invTimer--;

  // Bullets
  for (const b of bullets) {
    b.x += b.vx; b.y += b.vy; b.life--;
    if (collidesWalls({ x: b.x, y: b.y, r: 3 }, currentWalls)) { b.life = 0; continue; }
    for (const z of zombies) {
      if (z.dead) continue;
      if (Math.hypot(b.x - z.x, b.y - z.y) < 14) {
        z.hp--; z.flashTimer = 8; b.life = 0;
        if (z.hp <= 0) { z.dead = true; kills++; }
      }
    }
  }
  bullets = bullets.filter(b => b.life > 0);

  // Zombies
  for (const z of zombies) {
    if (z.dead) continue;
    if (z.flashTimer > 0) z.flashTimer--;

    const sees = canSeePlayer(z);

    // Alert state machine
    if (z.state !== 'chasing') {
      if (sees) {
        z.alertLevel = Math.min(100, z.alertLevel + ALERT_SPEED);
        z.state = z.alertLevel >= 100 ? 'chasing' : 'alert';
      } else {
        z.alertLevel = Math.max(0, z.alertLevel - ALERT_DECAY);
        z.state = z.alertLevel <= 0 ? 'idle' : 'alert';
      }
    }

    if (z.state === 'chasing') {
      // Chase player
      const ang = Math.atan2(player.y - z.y, player.x - z.x);
      z.angle = ang;
      const zx = z.x + Math.cos(ang) * z.speed * 1.4;
      const zy = z.y + Math.sin(ang) * z.speed * 1.4;
      if (!collidesWalls({ x: zx, y: z.y, r: 12 }, currentWalls)) z.x = zx;
      if (!collidesWalls({ x: z.x, y: zy, r: 12 }, currentWalls)) z.y = zy;
    } else {
      // Wander / patrol
      z.wanderTimer--;
      if (z.wanderTimer <= 0) {
        z.wanderAngle = Math.random() * Math.PI * 2;
        z.wanderTimer = 60 + Math.floor(Math.random() * 120);
      }
      let diff = z.wanderAngle - z.angle;
      while (diff >  Math.PI) diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;
      z.angle += diff * 0.025;

      const wx = z.x + Math.cos(z.angle) * 0.4;
      const wy = z.y + Math.sin(z.angle) * 0.4;
      if (!collidesWalls({ x: wx, y: z.y, r: 12 }, currentWalls)) z.x = wx;
      else z.wanderAngle = Math.random() * Math.PI * 2;
      if (!collidesWalls({ x: z.x, y: wy, r: 12 }, currentWalls)) z.y = wy;
    }

    // Damage player (only chasing zombies bite)
    if (z.state === 'chasing' && Math.hypot(z.x - player.x, z.y - player.y) < 16 && player.invTimer <= 0) {
      player.hp--;
      player.invTimer = 60;
      if (player.hp <= 0) { gameOver = true; showOverlay('GAME OVER', 'You got eaten.', 'RETRY'); }
    }
  }

  updateCamera();

  // Exit check
  if (Math.hypot(player.x - currentExit.x - TILE / 2, player.y - currentExit.y - TILE / 2) < 28) {
    if (level < levels.length - 1) {
      level++;
      loadLevel(level, false);
    } else {
      won = true;
      showOverlay('YOU SURVIVED', `All zones cleared. Total kills: ${kills}`, 'PLAY AGAIN');
    }
  }
}

// ── Draw ─────────────────────────────────────────────────────────────────────

function draw() {
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, W, H);

  const ox = -cam.x, oy = -cam.y;  // world→screen offset

  // Checkerboard floor (only visible tiles)
  const c0 = Math.floor(cam.x / TILE), c1 = Math.ceil((cam.x + W) / TILE);
  const r0 = Math.floor(cam.y / TILE), r1 = Math.ceil((cam.y + H) / TILE);
  ctx.fillStyle = '#161616';
  for (let r = r0; r <= r1; r++)
    for (let c = c0; c <= c1; c++)
      if ((r + c) % 2 === 0) ctx.fillRect(c * TILE + ox, r * TILE + oy, TILE, TILE);

  // FOV cones (drawn before walls so walls occlude them visually)
  for (const z of zombies) {
    if (z.dead || z.state === 'chasing') continue;
    ctx.save();
    ctx.translate(z.x + ox, z.y + oy);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, Z_RANGE, z.angle - Z_FOV / 2, z.angle + Z_FOV / 2);
    ctx.closePath();
    ctx.fillStyle = `rgba(255,160,0,${z.state === 'alert' ? 0.11 : 0.055})`;
    ctx.fill();
    ctx.restore();
  }

  // Walls
  for (const w of currentWalls) {
    const wx = w.x + ox, wy = w.y + oy;
    ctx.fillStyle = '#2a2a2a';
    ctx.fillRect(wx, wy, w.w, w.h);
    ctx.fillStyle = '#333';
    ctx.fillRect(wx + 2, wy + 2, w.w - 4, 4);
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(wx + 2, wy + w.h - 6, w.w - 4, 4);
  }

  // Exit tile
  const ex = currentExit;
  const pulse = 0.6 + 0.4 * Math.sin(Date.now() / 300);
  const esx = ex.x + ox, esy = ex.y + oy;
  ctx.fillStyle = `rgba(0,255,100,${pulse * 0.4})`;
  ctx.fillRect(esx, esy, TILE, TILE);
  ctx.strokeStyle = `rgba(0,255,100,${pulse})`;
  ctx.lineWidth = 2;
  ctx.strokeRect(esx + 2, esy + 2, TILE - 4, TILE - 4);
  ctx.fillStyle = `rgba(0,255,100,${pulse})`;
  ctx.font = 'bold 11px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('EXIT', esx + TILE / 2, esy + TILE / 2 + 4);

  // Bullets
  for (const b of bullets) {
    ctx.fillStyle = '#ffee44';
    ctx.beginPath(); ctx.arc(b.x + ox, b.y + oy, 3, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,220,50,0.3)';
    ctx.beginPath(); ctx.arc(b.x + ox, b.y + oy, 6, 0, Math.PI * 2); ctx.fill();
  }

  // Zombies
  for (const z of zombies) {
    if (z.dead) continue;
    const zsx = z.x + ox, zsy = z.y + oy;

    ctx.save();
    ctx.translate(zsx, zsy);
    ctx.rotate(z.angle + Math.PI / 2);

    let bodyCol = z.state === 'chasing' ? '#cc2200' : '#cc7700';
    let headCol = z.state === 'chasing' ? '#aa1800' : '#994400';
    if (z.flashTimer > 0) { bodyCol = '#ffffff'; headCol = '#ffaaaa'; }

    // Body
    ctx.fillStyle = bodyCol;
    ctx.fillRect(-8, -10, 16, 20);

    // Alert bar baked into torso
    if (z.alertLevel > 0 && z.flashTimer === 0) {
      ctx.fillStyle = 'rgba(0,0,0,0.55)';
      ctx.fillRect(-7, -8, 14, 3);
      const t = z.alertLevel / 100;
      ctx.fillStyle = `rgb(255,${Math.floor(120 * (1 - t))},0)`;
      ctx.fillRect(-7, -8, 14 * t, 3);
    }

    // Head
    ctx.fillStyle = headCol;
    ctx.fillRect(-6, -14, 12, 10);

    // Eyes
    ctx.fillStyle = z.state === 'chasing' ? '#ff0000' : '#ffcc00';
    ctx.fillRect(-4, -12, 3, 3);
    ctx.fillRect( 2, -12, 3, 3);

    // Arms
    ctx.fillStyle = bodyCol;
    ctx.fillRect(-12, -6, 4, 10);
    ctx.fillRect(  8, -6, 4, 10);

    ctx.restore();

    // HP bar (world space, above sprite)
    if (z.hp > 1) {
      ctx.fillStyle = '#ff3333';
      ctx.fillRect(zsx - 10, zsy - 26, 20, 3);
      ctx.fillStyle = '#33ff33';
      ctx.fillRect(zsx - 10, zsy - 26, 20 * (z.hp / 2), 3);
    }

    // Alert / chase indicator
    if (z.flashTimer === 0) {
      if (z.state === 'alert') {
        ctx.fillStyle = '#ffaa00';
        ctx.font = 'bold 16px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('!', zsx, zsy - 30);
      } else if (z.state === 'chasing') {
        ctx.fillStyle = '#ff3333';
        ctx.font = 'bold 13px Courier New';
        ctx.textAlign = 'center';
        ctx.fillText('!!', zsx, zsy - 30);
      }
    }
  }

  // Player
  ctx.save();
  ctx.translate(player.x + ox, player.y + oy);
  ctx.rotate(player.angle + Math.PI / 2);
  const flash = player.invTimer > 0 && Math.floor(player.invTimer / 5) % 2 === 0;
  if (!flash) {
    ctx.fillStyle = '#4488ff'; ctx.fillRect(-8, -10, 16, 20);
    ctx.fillStyle = '#336acc'; ctx.fillRect(-6, -14, 12, 10);
    ctx.fillStyle = '#888';    ctx.fillRect(-2, -22,  4, 14);
    ctx.fillStyle = '#fff';
    ctx.fillRect(-4, -12, 3, 3);
    ctx.fillRect( 2, -12, 3, 3);
  }
  ctx.restore();

  // Muzzle flash
  if (player.shootCooldown > 11) {
    ctx.fillStyle = 'rgba(255,220,50,0.85)';
    ctx.beginPath();
    ctx.arc(
      player.x + Math.cos(player.angle) * 26 + ox,
      player.y + Math.sin(player.angle) * 26 + oy,
      6, 0, Math.PI * 2
    );
    ctx.fill();
  }

  // Reload bar (screen-space, bottom centre)
  if (player.reloading) {
    const barW = 140, barH = 6;
    const bx = W / 2 - barW / 2, by = H - 22;
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(bx - 1, by - 1, barW + 2, barH + 2);
    const pct = 1 - player.reloadTimer / RELOAD_FRAMES;
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(bx, by, barW * pct, barH);
    ctx.fillStyle = '#ffaa00';
    ctx.font = '10px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText('RELOADING', W / 2, by - 5);
  }

  // Dim when game over / won
  if (gameOver || won) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, 0, W, H);
  }
}

// ── Input ─────────────────────────────────────────────────────────────────────

document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if ([' ', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });
</script>
</body>
</html>
